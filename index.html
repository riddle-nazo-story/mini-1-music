<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>謎解きサンプラー</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>謎解きサンプラー</h1>

<section class="soundButtons">

<button onclick="playSE('correct')">正解</button>
<button onclick="playSE('wrong')">不正解</button>
<button onclick="playSE('hint')">ヒント</button>

</section>

<section>

<h2>ゲーム中音声</h2>

<audio id="gameAudio" controls>
<source src="audio/game.mp3" type="audio/mpeg">
</audio>

<label>音量</label>
<input type="range" min="0" max="1" step="0.01" value="1"
oninput="setVolume('gameAudio', this.value)">

</section>

<section>

<h2>エンディング音声</h2>

<audio id="endingAudio" controls>
<source src="audio/ending.mp3" type="audio/mpeg">
</audio>

<label>音量</label>
<input type="range" min="0" max="1" step="0.01" value="1"
oninput="setVolume('endingAudio', this.value)">

</section>

<section class="timer">

<h2>15分タイマー</h2>

<div id="time">15:00</div>

<button onclick="startTimer()">スタート</button>
<button onclick="stopTimer()">ストップ</button>
<button onclick="resetTimer()">リセット</button>

</section>

</div>

<script src="script.js"></script>

</body>

</html>
