<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>謎解きサンプラー（WebAudio版）</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <h1>謎解きサンプラー</h1>

  <!-- 初回に押してオーディオを有効化（モバイル制限対策） -->
  <div id="unlockOverlay" class="overlay">
    <button id="unlockBtn">タップして音声を有効化</button>
    <p class="small">（この操作は1回必要です。完了後、音量スライダーがスマホで動作します）</p>
  </div>

  <section class="soundButtons">
    <button id="btnCorrect" class="se-btn">正解</button>
    <button id="btnWrong" class="se-btn">不正解</button>
    <button id="btnHint" class="se-btn">ヒント</button>
  </section>

  <section class="player">
    <h2>ゲーム中音声（オープニング）</h2>
    <audio id="gameAudio" controls src="audio/game.mp3" preload="none"></audio>
    <label class="volLabel">音量</label>
    <input id="gameVol" class="vol" type="range" min="0" max="1" step="0.01" value="1" />
  </section>

  <section class="player">
    <h2>エンディング音声</h2>
    <audio id="endingAudio" controls src="audio/ending.mp3" preload="none"></audio>
    <label class="volLabel">音量</label>
    <input id="endingVol" class="vol" type="range" min="0" max="1" step="0.01" value="1" />
  </section>

  <section class="timer">
    <h2>15分タイマー</h2>
    <div id="time">15:00</div>
    <button id="startBtn">スタート</button>
    <button id="stopBtn">ストップ</button>
    <button id="resetBtn">リセット</button>
  </section>

  <!-- 全停止ボタンを追加（公演で必須級） -->
  <section>
    <button id="stopAll" class="stop-all">全ての音を停止</button>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
